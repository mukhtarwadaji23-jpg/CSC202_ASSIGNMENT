<!DOCTYPE html>
<html>
<head>
    <title>Clinic Queue</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f9;
            text-align: center;
        }

        h1 {
            color: #2c3e50;
        }

        form {
            margin: 20px;
        }

        input {
            padding: 10px;
            width: 200px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            padding: 10px 15px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #2980b9;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: white;
            margin: 10px auto;
            padding: 10px;
            width: 300px;
            border-radius: 5px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }

        .next-btn {
            background-color: #27ae60;
        }

        .next-btn:hover {
            background-color: #219150;
        }

        .total {
            margin-top: 20px;
            font-weight: bold;
            color: #8e44ad;
        }
    </style>

</head>
<body>

<h1>Clinic Queue Manager</h1>

<form action="/add" method="post">
    <input type="text" name="name" placeholder="Enter name" required>
    <button type="submit">Add Patient</button>
</form>

<h2>Waiting List</h2>

<ul>
{% for p in patients %}
<li>{{ p.get_details() }}</li>
{% else %}
<li>No patients</li>
{% endfor %}
</ul>

<a href="/next">
    <button class="next-btn">Call Next Patient</button>
</a>

<div class="total">
    Total Seen Today: {{ total }}
</div>

</body>
</html>
